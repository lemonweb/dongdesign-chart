<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>dongCharts 图表生成器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f7;
      --card: #ffffff;
      --border: #e6e6e6;
      --text: #262626;
      --text-secondary: #595959;
      --text-tertiary: #8c8c8c;
      --primary: #3365f7;
      --danger: #ff4d4f;
      --radius: 6px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 12px 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
    }
    h1 { font-size: 14px; font-weight: 600; margin: 0 0 10px; }
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
    }
    .type-group { display: flex; gap: 6px; }
    .type-btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all .15s;
    }
    .type-btn:hover { border-color: var(--primary); color: var(--primary); }
    .type-btn.active {
      border-color: var(--primary);
      background: rgba(51,101,247,.08);
      color: var(--primary);
      font-weight: 600;
    }
    .preview {
      background: #fff;
      border-radius: var(--radius);
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    textarea {
      width: 100%;
      min-height: 96px;
      resize: vertical;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      background: #fafafa;
      outline: none;
    }
    textarea:focus { border-color: var(--primary); background: #fff; }
    .data-tip { font-size: 11px; color: var(--text-tertiary); margin-top: 6px; }
    .err { color: var(--danger); }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    .field { flex: 1; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }
    .field input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      outline: none;
    }
    .field input[type="number"]:focus { border-color: var(--primary); }
    .field input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      outline: none;
    }
    .field input[type="text"]:focus { border-color: var(--primary); }
    .field select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }
    .field select:focus { border-color: var(--primary); }
    .palette-swatch {
      display: inline-flex;
      gap: 2px;
      margin-top: 4px;
    }
    .palette-swatch span {
      width: 14px;
      height: 8px;
      border-radius: 2px;
    }
    .toggle-list { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .toggle input { margin: 0; cursor: pointer; }
    .footer {
      display: flex;
      gap: 8px;
      padding-top: 4px;
    }
    button.primary, button.ghost {
      flex: 1;
      padding: 10px 0;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s;
    }
    button.primary {
      background: var(--primary);
      color: #fff;
    }
    button.primary:hover { background: #1f4dd9; }
    button.ghost {
      background: #fff;
      border-color: var(--border);
      color: var(--text-secondary);
    }
    button.ghost:hover { border-color: var(--primary); color: var(--primary); }
    .status {
      font-size: 11px;
      min-height: 14px;
      margin-top: 6px;
      color: var(--text-tertiary);
    }
    .status.error { color: var(--danger); }
    .status.success { color: #16c87f; }
    /* 自适应布局：body 撑满窗口，section 自适应宽度 */
    html, body { width: 100%; height: 100%; }
    body { overflow-x: hidden; padding-bottom: 28px; }
    .preview { height: clamp(160px, 28vh, 360px); }
    textarea { min-height: clamp(80px, 14vh, 240px); }
    /* 右下角 resize 把手 */
    .resize-grip {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 18px;
      height: 18px;
      cursor: nwse-resize;
      background:
        linear-gradient(135deg, transparent 0 9px, var(--text-tertiary) 9px 11px, transparent 11px 13px, var(--text-tertiary) 13px 15px, transparent 15px);
      opacity: .55;
      z-index: 10;
      user-select: none;
    }
    .resize-grip:hover { opacity: 1; }
    .gen-row { display: flex; gap: 8px; align-items: flex-end; }
    .gen-row .field { flex: 1; }
    .gen-row .gen-btn {
      padding: 6px 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .gen-row .gen-btn:hover { border-color: var(--primary); color: var(--primary); }
    /* 代码弹窗 */
    .code-modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: stretch; justify-content: stretch; }
    .code-modal[hidden] { display: none; }
    .code-modal-mask { position: absolute; inset: 0; background: rgba(0,0,0,.32); }
    .code-modal-body {
      position: relative;
      margin: auto;
      width: min(640px, 92vw);
      max-height: 86vh;
      background: #1f2329;
      color: #e6e6e6;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 12px 36px rgba(0,0,0,.4);
    }
    .code-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #2c333d;
      color: #fff;
      font-size: 12px;
    }
    .code-pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      flex: 1;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11.5px;
      line-height: 1.6;
      color: #e6e6e6;
      white-space: pre;
    }
  </style>
</head>
<body>
  <h1>图表生成器</h1>

  <div class="section">
    <div class="section-title">图表类型</div>
    <div class="type-group" id="type-group">
      <button class="type-btn active" data-type="line">折线图</button>
      <button class="type-btn" data-type="bar">柱状图</button>
      <button class="type-btn" data-type="donut">环形图</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">渲染引擎（决定导出代码格式）</div>
    <div class="type-group" id="engine-group">
      <button class="type-btn active" data-engine="echarts">ECharts</button>
      <button class="type-btn" data-engine="g2">AntV G2</button>
    </div>
    <div class="data-tip" style="margin-top:6px;">两种引擎都按 dongDesign-chart 规范映射，预览与 Figma 图层完全一致；引擎仅决定「查看代码」面板输出哪种实现。</div>
  </div>

  <div class="section">
    <div class="section-title">预览</div>
    <div class="preview" id="preview"></div>
  </div>

  <div class="section">
    <div class="section-title">标题</div>
    <div class="row">
      <div class="field">
        <input id="title" type="text" placeholder="可选，默认不显示" />
      </div>
    </div>
    <label class="toggle" style="margin-top:6px;"><input type="checkbox" id="showTitle" />显示标题</label>
  </div>

  <div class="section">
    <div class="section-title">数据 (CSV / JSON)</div>
    <textarea id="data"></textarea>
    <div class="data-tip" id="data-tip">第一列为类目，后续列为数值系列。</div>
  </div>

  <div class="section">
    <div class="section-title">数据生成</div>
    <div class="row">
      <div class="field">
        <label>维度数量</label>
        <input id="genDim" type="number" min="2" max="24" step="1" value="6" />
      </div>
      <div class="field">
        <label>指标数量</label>
        <input id="genMes" type="number" min="1" max="6" step="1" value="2" />
      </div>
    </div>
    <div class="gen-row">
      <div class="field">
        <label>分布形态</label>
        <select id="genShape">
          <option value="random">随机</option>
          <option value="uptrend">上升</option>
          <option value="downtrend">下降</option>
          <option value="peak">峰形</option>
          <option value="valley">谷形</option>
          <option value="wave-up">升浪</option>
          <option value="wave-down">降浪</option>
        </select>
      </div>
      <button class="gen-btn" id="genData">随机生成</button>
    </div>
    <div class="gen-row" id="seriesNamesRow" style="margin-top:8px;">
      <div class="field">
        <label id="seriesNamesLabel">系列名（逗号分隔）</label>
        <input id="seriesNames" type="text" placeholder="例如：销售额, 订单量" />
      </div>
      <button class="gen-btn" id="applySeriesNames">应用</button>
    </div>
    <div class="data-tip">环形图始终使用 1 个指标。修改系列名后点「应用」会同步刷新表头与预览。</div>
  </div>

  <div class="section">
    <div class="section-title">尺寸</div>
    <div class="row">
      <div class="field">
        <label>宽度</label>
        <input id="width" type="number" min="320" max="1200" step="10" value="640" />
      </div>
      <div class="field">
        <label>高度</label>
        <input id="height" type="number" min="240" max="900" step="10" value="360" />
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">色板</div>
    <div class="field">
      <select id="palette"></select>
      <div class="palette-swatch" id="palette-preview"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">显示选项</div>
    <div class="toggle-list">
      <label class="toggle"><input type="checkbox" id="showLegend" checked />显示图例</label>
      <label class="toggle"><input type="checkbox" id="showAxis" checked />显示坐标轴</label>
      <label class="toggle"><input type="checkbox" id="showGrid" checked />显示网格线</label>
      <label class="toggle"><input type="checkbox" id="showLabels" />显示数据标签</label>
      <label class="toggle"><input type="checkbox" id="showMarkPoint" />显示标记点</label>
    </div>
    <div class="row" style="margin-top:8px;">
      <div class="field">
        <label>图例位置</label>
        <select id="legendPosition">
          <option value="top-left">左上</option>
          <option value="top-right">右上</option>
          <option value="bottom-left">左下</option>
          <option value="bottom-right">右下</option>
          <option value="left-center">左中</option>
          <option value="right-center">右中</option>
        </select>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="ghost" id="reset">重置数据</button>
    <button class="ghost" id="viewCode">查看代码</button>
    <button class="primary" id="generate">生成图表</button>
  </div>
  <div class="status" id="status"></div>

  <!-- 代码导出面板 -->
  <div class="code-modal" id="codeModal" hidden>
    <div class="code-modal-mask" id="codeModalMask"></div>
    <div class="code-modal-body">
      <div class="code-modal-header">
        <strong id="codeTitle">代码</strong>
        <div style="display:flex;gap:6px;">
          <button class="gen-btn" id="copyCode">复制</button>
          <button class="gen-btn" id="closeCode">关闭</button>
        </div>
      </div>
      <pre class="code-pre"><code id="codeText"></code></pre>
    </div>
  </div>

  <div class="resize-grip" id="resize-grip" title="拖拽缩放窗口"></div>

  <script>
    // 色板（与 theme.ts 中的 PALETTES 保持同步）
    const PALETTES = [
      { id: 'category', label: '分类色板', colors: ['#3365F7','#30CAFA','#0B2165','#EF69CA','#FFBA30','#16C87F','#482AC4','#FF6D4E','#B8CE92','#004B91','#008FCA','#D1DEF3'] },
      { id: 'sequential-blue', label: '有序色板 · 蓝', colors: ['#DFE8FE','#CBDEFD','#A8C8FC','#84B1FA','#6F97F9','#4881FC','#3365F7','#0C57CD','#0945A5','#083480'] },
      { id: 'sequential-green', label: '有序色板 · 绿', colors: ['#C7F1D6','#A0EDC0','#67DDA1','#00CA85','#00B073','#009A64','#008455','#006D45','#005737','#004128'] },
      { id: 'sequential-orange', label: '有序色板 · 橙', colors: ['#FEF1E9','#FCE4D3','#FAD6BA','#FFB87C','#FB994C','#EA7F1E','#CF6B1B','#B25A17','#944B00','#733E00'] },
      { id: 'sequential-red', label: '有序色板 · 红', colors: ['#FFF0F0','#FFD1CF','#FFB2B0','#F59494','#EB787A','#E5525C','#CC3B47','#B51C36','#990026','#75001C'] },
      { id: 'diverging-5', label: '发散色板 · 五色', colors: ['#055CC4','#5085F4','#52AD40','#EDBF00','#B51C36'] },
      { id: 'diverging-10', label: '发散色板 · 十色', colors: ['#083480','#3365F7','#6F97F9','#A8C8FC','#EFF3FF','#FFF2DB','#FFB87C','#EA7F1E','#BA1D00','#961600'] },
      { id: 'semantic', label: '语义色板', colors: ['#16C87F','#FFA71A','#F53333'] },
    ];
    const AXIS = '#D9D9D9';
    const GRID = '#EBEBEB';
    const LABEL = '#8C8C8C';
    const TEXT = '#262626';

    const DEFAULTS = {
      line: 'month,DAU,MAU\n1月,1200,4200\n2月,1450,4600\n3月,1620,5100\n4月,1800,5400\n5月,2100,6000\n6月,2400,6500',
      bar: 'category,北京,上海\nQ1,120,90\nQ2,180,140\nQ3,210,200\nQ4,260,230',
      donut: 'channel,share\n搜索,3200\n推荐,2400\n直接,1600\n社交,800',
    };

    let chartType = 'line';
    let paletteId = 'category';
    let engine = 'echarts';
    const $ = (id) => document.getElementById(id);

    function getCurrentPalette() {
      return PALETTES.find(p => p.id === paletteId) || PALETTES[0];
    }

    function pickColor(idx) {
      const cs = getCurrentPalette().colors;
      return cs[idx % cs.length];
    }

    function getOptions() {
      return {
        chartType,
        width: clamp(parseInt($('width').value, 10) || 640, 320, 1200),
        height: clamp(parseInt($('height').value, 10) || 360, 240, 900),
        title: $('title').value || '',
        showTitle: $('showTitle').checked,
        showLegend: $('showLegend').checked,
        legendPosition: $('legendPosition').value,
        showAxis: $('showAxis').checked,
        showGrid: $('showGrid').checked,
        showLabels: $('showLabels').checked,
        showMarkPoint: $('showMarkPoint').checked,
        palette: paletteId,
        theme: 'default',
        engine,
        dataText: $('data').value,
      };
    }

    function clamp(v, min, max) { return Math.min(max, Math.max(min, v)); }

    // ---- 数据解析（与插件端解析逻辑保持一致的子集，用于预览） ----
    function parseDataset(input) {
      const trimmed = (input || '').trim();
      if (!trimmed) throw new Error('请输入数据。');
      const rows = (trimmed.startsWith('{') || trimmed.startsWith('['))
        ? parseJsonRows(trimmed)
        : parseCsvRows(trimmed);
      const categories = rows.map((r, i) => r.category || `类别 ${i+1}`);
      const seriesNames = Array.from(new Set(rows.flatMap(r => Object.keys(r.values))));
      if (!seriesNames.length) throw new Error('需要至少 1 个数值系列。');
      const series = seriesNames.map((name, idx) => ({
        name,
        values: rows.map(r => Number.isFinite(r.values[name]) ? r.values[name] : 0),
        color: pickColor(idx),
      }));
      return { categories, series };
    }

    function parseCsvRows(input) {
      const lines = input.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      if (lines.length < 2) throw new Error('CSV 至少需要表头和一行数据。');
      const headers = lines[0].split(',').map(s => s.trim());
      return lines.slice(1).map((line, i) => {
        const cells = line.split(',').map(s => s.trim());
        const values = {};
        headers.slice(1).forEach((h, hi) => {
          values[h || `系列${hi+1}`] = Number(cells[hi+1]) || 0;
        });
        return { category: cells[0] || `类别 ${i+1}`, values };
      });
    }

    function parseJsonRows(input) {
      const data = JSON.parse(input);
      if (Array.isArray(data)) {
        return data.map((it, i) => {
          const keys = Object.keys(it);
          const catKey = keys.find(k => isNaN(Number(it[k]))) || keys[0];
          const values = {};
          keys.forEach(k => { if (k !== catKey) values[k] = Number(it[k]) || 0; });
          return { category: String(it[catKey] ?? `类别 ${i+1}`), values };
        });
      }
      throw new Error('JSON 暂仅支持对象数组。');
}

    // ---- SVG 预览 ----
    function renderPreview() {
      const box = $('preview');
      box.innerHTML = '';
      let ds;
      try { ds = parseDataset($('data').value); }
      catch (e) {
        box.innerHTML = `<div style="color:#ff4d4f;font-size:11px;">${e.message}</div>`;
        return;
      }
      const W = box.clientWidth || 420, H = 180;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svg.setAttribute('width', W); svg.setAttribute('height', H);
      svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

      // 计算图例与绘图区的布局
      const showLegend = $('showLegend').checked;
      const pos = $('legendPosition').value;
      const padX = 8, padY = 8, gap = 8;
      const titleH = ($('showTitle').checked && $('title').value.trim()) ? 18 + gap : 0;
      const items = chartType === 'donut'
        ? ds.categories.map((c, i) => ({ name: c, color: pickColor(i) }))
        : ds.series.map((s, i) => ({ name: s.name, color: s.color }));

      // 标题
      if (titleH) {
        const t = el('text', { x: padX, y: padY + 12, fill: TEXT, 'font-size': 11, 'font-weight': 600 });
        t.textContent = $('title').value;
        svg.appendChild(t);
      }

      const innerL = padX, innerT = padY + titleH;
      const innerR = W - padX, innerB = H - padY;
      let plotL = innerL, plotT = innerT, plotR = innerR, plotB = innerB;

      if (showLegend) {
        const isVertical = pos === 'left-center' || pos === 'right-center';
        const legendSize = measureLegend(items, isVertical);
        let lx, ly;
        if (pos === 'top-left' || pos === 'top-right') {
          ly = innerT;
          plotT = innerT + legendSize.h + gap;
          lx = (pos === 'top-left') ? innerL : innerR - legendSize.w;
        } else if (pos === 'bottom-left' || pos === 'bottom-right') {
          ly = innerB - legendSize.h;
          plotB = innerB - legendSize.h - gap;
          lx = (pos === 'bottom-left') ? innerL : innerR - legendSize.w;
        } else if (pos === 'left-center') {
          lx = innerL;
          plotL = innerL + legendSize.w + gap;
          ly = innerT + ((innerB - innerT) - legendSize.h) / 2;
        } else { // right-center
          lx = innerR - legendSize.w;
          plotR = innerR - legendSize.w - gap;
          ly = innerT + ((innerB - innerT) - legendSize.h) / 2;
        }
        drawLegend(svg, items, lx, ly, isVertical);
      }

      const plotW = Math.max(40, plotR - plotL);
      const plotH = Math.max(40, plotB - plotT);

      if (chartType === 'donut') drawDonutPreview(svg, ds, plotL, plotT, plotW, plotH);
      else drawCartesianPreview(svg, ds, plotL, plotT, plotW, plotH, chartType);
      box.appendChild(svg);
    }

    function measureLegend(items, isVertical) {
      // 严格按规范：水平项间距 20px、垂直行距 8px、shape↔label 间距 5px
      const labelChar = 6.5; // 近似单字符宽度
      const itemHeights = 14;
      const HGAP = 20; // 水平项间距
      const VGAP = 8;  // 垂直行距
      const itemWidths = items.map(it => 10 + 5 + Math.max(20, (it.name.length * labelChar)));
      if (isVertical) {
        const w = Math.max(...itemWidths);
        const h = items.length * itemHeights + (items.length - 1) * VGAP;
        return { w, h };
      }
      const w = itemWidths.reduce((s, v) => s + v, 0) + (items.length - 1) * HGAP;
      return { w, h: itemHeights };
    }

    function drawLegend(svg, items, x, y, isVertical) {
      const labelChar = 6.5;
      const lineH = 14;
      const HGAP = 20;
      const VGAP = 8;
      let cx = x, cy = y;
      items.forEach((it) => {
        const isLine = chartType === 'line';
        if (isLine) {
          svg.appendChild(el('rect', { x: cx, y: cy + 6, width: 10, height: 2, rx: 1, fill: it.color }));
        } else {
          svg.appendChild(el('rect', { x: cx, y: cy + 2, width: 10, height: 10, rx: 2, fill: it.color }));
        }
        const tx = cx + 10 + 5;
        const t = el('text', { x: tx, y: cy + 11, fill: '#595959', 'font-size': 11 });
        t.textContent = it.name;
        svg.appendChild(t);
        const itemW = 10 + 5 + Math.max(20, (it.name.length * labelChar));
        if (isVertical) {
          cy += lineH + VGAP;
        } else {
          cx += itemW + HGAP;
        }
      });
    }

    function drawCartesianPreview(svg, ds, x, y, W, H, mode) {
      const pad = { l: 32, r: 8, t: 8, b: 18 };
      const values = ds.series.flatMap(s => s.values);
      const min = Math.min(0, ...values);
      const max = Math.max(...values, 1);
      const iw = W - pad.l - pad.r;
      const ih = H - pad.t - pad.b;
      const isBar = mode === 'bar';
      const lineEdge = iw * 0.06;
      const xc = (i, n) => {
        if (isBar) return x + pad.l + (iw / n) * (i + 0.5);
        if (n <= 1) return x + pad.l + iw / 2;
        const usable = iw - lineEdge * 2;
        return x + pad.l + lineEdge + (usable / (n - 1)) * i;
      };
      const yc = (v) => y + pad.t + ih * (1 - (v - min) / (max - min || 1));

      if ($('showGrid').checked) {
        for (let i = 0; i <= 4; i++) {
          const ly = y + pad.t + (ih / 4) * i;
          svg.appendChild(el('line', { x1: x + pad.l, x2: x + pad.l + iw, y1: ly, y2: ly, stroke: GRID, 'stroke-dasharray': '4 4' }));
        }
      }
      if ($('showAxis').checked) {
        svg.appendChild(el('line', { x1: x + pad.l, x2: x + pad.l + iw, y1: y + pad.t + ih, y2: y + pad.t + ih, stroke: AXIS }));
        ds.categories.forEach((c, i) => {
          const t = el('text', { x: xc(i, ds.categories.length), y: y + H - 4, fill: LABEL, 'font-size': 9, 'text-anchor': 'middle' });
          t.textContent = c;
          svg.appendChild(t);
        });
      }

      const showMP = $('showMarkPoint').checked;
      if (mode === 'line') {
        ds.series.forEach(s => {
          const d = s.values.map((v, i) => `${i ? 'L' : 'M'} ${xc(i, s.values.length)} ${yc(v)}`).join(' ');
          svg.appendChild(el('path', { d, stroke: s.color, 'stroke-width': 2, fill: 'none', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }));
          if (showMP) {
            s.values.forEach((v, i) => {
              svg.appendChild(el('circle', { cx: xc(i, s.values.length), cy: yc(v), r: 4, fill: s.color, stroke: '#fff', 'stroke-width': 2 }));
            });
          }
        });
      } else {
        const n = ds.categories.length;
        const sn = ds.series.length;
        const slot = iw / n;
        const bw = Math.max(2, Math.min(20, (slot - 6) / sn - 1));
        const baseY = yc(0);
        ds.series.forEach((s, si) => {
          s.values.forEach((v, i) => {
            const cxv = xc(i, n);
            const gx = cxv - (bw * sn + (sn - 1)) / 2 + si * (bw + 1);
            const vy = yc(v);
            svg.appendChild(el('rect', { x: gx, y: Math.min(vy, baseY), width: bw, height: Math.max(1, Math.abs(vy - baseY)), fill: s.color, rx: 1.5 }));
          });
        });
      }
    }

    function drawDonutPreview(svg, ds, x, y, W, H) {
      const primary = ds.series[0];
      if (!primary) return;
      const cx = x + W / 2, cy = y + H / 2;
      const outerR = Math.min(W, H) / 2 - 8;
      const innerR = outerR * 0.7;
      const total = primary.values.reduce((s, v) => s + Math.max(0, v), 0) || 1;
      let start = -Math.PI / 2;
      primary.values.forEach((v, i) => {
        if (v <= 0) return;
        const ang = (v / total) * Math.PI * 2;
        const end = start + ang;
        svg.appendChild(el('path', { d: donutPath(cx, cy, outerR, innerR, start, end), fill: pickColor(i), stroke: '#fff' }));
        start = end;
      });
      const t1 = el('text', { x: cx, y: cy - 2, 'text-anchor': 'middle', 'font-size': 12, 'font-weight': 600, fill: TEXT });
      t1.textContent = total.toLocaleString();
      svg.appendChild(t1);
      const t2 = el('text', { x: cx, y: cy + 12, 'text-anchor': 'middle', 'font-size': 9, fill: LABEL });
      t2.textContent = '总计';
      svg.appendChild(t2);
    }

    function donutPath(cx, cy, oR, iR, a1, a2) {
      const large = a2 - a1 > Math.PI ? 1 : 0;
      const p = (a, r) => [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
      const [ox1, oy1] = p(a1, oR), [ox2, oy2] = p(a2, oR);
      const [ix1, iy1] = p(a2, iR), [ix2, iy2] = p(a1, iR);
      return `M ${ox1} ${oy1} A ${oR} ${oR} 0 ${large} 1 ${ox2} ${oy2} L ${ix1} ${iy1} A ${iR} ${iR} 0 ${large} 0 ${ix2} ${iy2} Z`;
    }

    function el(tag, attrs) {
      const node = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k, v]) => node.setAttribute(k, v));
      return node;
    }

    // ---- 色板 UI ----
    function initPaletteSelect() {
      const sel = $('palette');
      PALETTES.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.label;
        sel.appendChild(opt);
      });
      sel.value = paletteId;
      sel.addEventListener('change', () => {
        paletteId = sel.value;
        renderPaletteSwatch();
        renderPreview();
      });
      renderPaletteSwatch();
    }

    function renderPaletteSwatch() {
      const wrap = $('palette-preview');
      wrap.innerHTML = '';
      getCurrentPalette().colors.forEach(c => {
        const span = document.createElement('span');
        span.style.background = c;
        wrap.appendChild(span);
      });
    }

    // ---- 事件 ----
    function setType(t) {
      chartType = t;
      document.querySelectorAll('#type-group .type-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.type === t);
      });
      $('data').value = DEFAULTS[t];
      // 默认图例位置：饼图右中，折线/柱状右上
      $('legendPosition').value = (t === 'donut') ? 'right-center' : 'top-right';
      renderPreview();
      refreshSeriesNamesInput();
    }

    function setEngine(e) {
      engine = e;
      document.querySelectorAll('#engine-group .type-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.engine === e);
      });
    }

    document.querySelectorAll('#type-group .type-btn').forEach(btn => {
      btn.addEventListener('click', () => setType(btn.dataset.type));
    });
    document.querySelectorAll('#engine-group .type-btn').forEach(btn => {
      btn.addEventListener('click', () => setEngine(btn.dataset.engine));
    });
    ['data','title','showTitle','showLegend','showAxis','showGrid','showLabels','showMarkPoint','legendPosition'].forEach(id => {
      $(id).addEventListener('input', renderPreview);
      $(id).addEventListener('change', renderPreview);
    });
    $('data').addEventListener('input', refreshSeriesNamesInput);

    $('reset').addEventListener('click', () => setType(chartType));
    $('generate').addEventListener('click', () => {
      const status = $('status');
      status.className = 'status';
      status.textContent = '生成中...';
      parent.postMessage({ pluginMessage: { type: 'generate', payload: getOptions() } }, '*');
    });

    // ---- 代码导出 ----
    $('viewCode').addEventListener('click', () => {
      const status = $('status');
      status.className = 'status';
      status.textContent = '生成代码中...';
      parent.postMessage({ pluginMessage: { type: 'export-code', payload: getOptions() } }, '*');
    });
    $('closeCode').addEventListener('click', () => { $('codeModal').hidden = true; });
    $('codeModalMask').addEventListener('click', () => { $('codeModal').hidden = true; });
    $('copyCode').addEventListener('click', async () => {
      const text = $('codeText').textContent || '';
      try {
        await navigator.clipboard.writeText(text);
        $('copyCode').textContent = '已复制';
        setTimeout(() => { $('copyCode').textContent = '复制'; }, 1200);
      } catch (_) {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
        $('copyCode').textContent = '已复制';
        setTimeout(() => { $('copyCode').textContent = '复制'; }, 1200);
      }
    });

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      const status = $('status');
      if (msg.type === 'generate-success') {
        status.className = 'status success';
        status.textContent = '✓ 已生成图表';
      } else if (msg.type === 'generate-error') {
        status.className = 'status error';
        status.textContent = '⚠️ ' + msg.message;
      } else if (msg.type === 'generate-data-success') {
        $('data').value = msg.csv;
        renderPreview();
        refreshSeriesNamesInput();
        status.className = 'status success';
        status.textContent = '✓ 已生成示例数据';
      } else if (msg.type === 'generate-data-error') {
        status.className = 'status error';
        status.textContent = '⚠️ ' + msg.message;
      } else if (msg.type === 'init-size') {
        // 插件首次告知 UI 当前窗口尺寸（用于恢复）
        // 这里仅触发预览重绘，因为 SVG 宽度依赖 box.clientWidth
        renderPreview();
      } else if (msg.type === 'export-code-success') {
        $('codeText').textContent = msg.code;
        const label = msg.engine === 'g2' ? 'AntV G2' : 'ECharts';
        $('codeTitle').textContent = `${label} 代码 · ${chartType === 'line' ? '折线图' : chartType === 'bar' ? '柱状图' : '环形图'}`;
        $('codeModal').hidden = false;
        status.className = 'status success';
        status.textContent = '✓ 已生成代码';
      } else if (msg.type === 'export-code-error') {
        status.className = 'status error';
        status.textContent = '⚠️ ' + msg.message;
      }
    };

    // ---- 随机生成数据 ----
    $('genData').addEventListener('click', () => {
      const dim = parseInt($('genDim').value, 10) || 6;
      const mes = parseInt($('genMes').value, 10) || 2;
      const shape = $('genShape').value;
      parent.postMessage({
        pluginMessage: {
          type: 'generate-data',
          generate: { chartType, dimensions: dim, measures: mes, distribution: shape }
        }
      }, '*');
      const status = $('status');
      status.className = 'status';
      status.textContent = '生成数据中...';
    });

    // ---- 自定义系列名 ----
    // 从 CSV 第一行表头提取「系列名」：
    //   折线/柱状：表头第 2~N 列即系列名
    //   环形图：表头第 1 列其实是类目，第 2 列是唯一系列，按规范我们把"类目"当作可重命名的项展示
    function getCurrentSeriesNames() {
      const text = ($('data').value || '').trim();
      if (!text) return [];
      if (text.startsWith('{') || text.startsWith('[')) return [];
      const firstLine = text.split(/\r?\n/)[0] || '';
      const cells = firstLine.split(',').map(s => s.trim());
      if (chartType === 'donut') {
        // 环形图：取所有数据行的第一列（类目）作为可重命名项
        const lines = text.split(/\r?\n/).slice(1).map(l => l.trim()).filter(Boolean);
        return lines.map(l => (l.split(',')[0] || '').trim());
      }
      return cells.slice(1);
    }

    function setCurrentSeriesNames(names) {
      const text = ($('data').value || '').trim();
      if (!text) return;
      if (text.startsWith('{') || text.startsWith('[')) {
        // JSON 暂不支持重命名
        const status = $('status');
        status.className = 'status error';
        status.textContent = '⚠️ JSON 格式数据暂不支持重命名，请改用 CSV';
        return;
      }
      const lines = text.split(/\r?\n/);
      if (chartType === 'donut') {
        // 改第一列（类目）：按行写回
        const dataLines = lines.slice(1).filter(l => l.trim());
        const newLines = [lines[0]];
        dataLines.forEach((line, i) => {
          const cells = line.split(',');
          if (names[i]) cells[0] = names[i];
          newLines.push(cells.join(','));
        });
        $('data').value = newLines.join('\n');
      } else {
        // 改表头第 2~N 列
        const headerCells = (lines[0] || '').split(',');
        names.forEach((n, i) => { if (n) headerCells[i + 1] = n; });
        lines[0] = headerCells.join(',');
        $('data').value = lines.join('\n');
      }
      renderPreview();
    }

    function refreshSeriesNamesInput() {
      const names = getCurrentSeriesNames();
      $('seriesNames').value = names.join(', ');
      $('seriesNamesLabel').textContent = chartType === 'donut' ? '类目名（��号分隔）' : '系列名（逗号分隔）';
    }

    $('applySeriesNames').addEventListener('click', () => {
      const raw = $('seriesNames').value || '';
      const names = raw.split(',').map(s => s.trim()).filter(Boolean);
      if (names.length === 0) return;
      setCurrentSeriesNames(names);
      const status = $('status');
      status.className = 'status success';
      status.textContent = '✓ 已更新' + (chartType === 'donut' ? '类目名' : '系列名');
    });

    // ---- 窗口拖拽缩放 ----
    (function setupResize() {
      const grip = $('resize-grip');
      let dragging = false;
      let startX = 0, startY = 0, startW = 0, startH = 0;
    const MIN_W = 380, MIN_H = 600, MAX_W = 1200, MAX_H = 1400;
      let lastSent = 0;
      const sendResize = (w, h) => {
        const now = Date.now();
        if (now - lastSent < 30) return;
        lastSent = now;
        parent.postMessage({ pluginMessage: { type: 'resize', size: { w, h } } }, '*');
      };
      grip.addEventListener('pointerdown', (e) => {
        dragging = true;
        startX = e.clientX;
        startY = e.clientY;
        startW = window.innerWidth;
        startH = window.innerHeight;
        grip.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      grip.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const w = Math.max(MIN_W, Math.min(MAX_W, Math.round(startW + (e.clientX - startX))));
        const h = Math.max(MIN_H, Math.min(MAX_H, Math.round(startH + (e.clientY - startY))));
        sendResize(w, h);
      });
      grip.addEventListener('pointerup', (e) => {
        dragging = false;
        try { grip.releasePointerCapture(e.pointerId); } catch (_) {}
      });
    })();

    // 窗口尺寸变化时重绘预览（让 SVG 宽度跟随）
    window.addEventListener('resize', () => {
      renderPreview();
    });

    // 初始化
    initPaletteSelect();
    setType('line');
    refreshSeriesNamesInput();
  </script>
</body>
</html>
