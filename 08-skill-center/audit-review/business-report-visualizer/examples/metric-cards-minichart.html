<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>指标卡 MiniChart 示例</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --text: #1f2329;
      --muted: #8c8c8c;
      --border: #dadce0;
      --blue: #2f6bff;
      --positive: #e2231a;
      --negative: #26a872;
      --neutral: #595959;
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    main {
      width: min(100%, 1460px);
      margin: 0 auto;
      padding: 32px 24px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 460px));
      gap: 16px;
      align-items: start;
    }

    .metric-card {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 460px;
      padding: 12px 16px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .metric-title {
      height: 28px;
      margin: 0 0 2px;
      color: #595959;
      font-size: 14px;
      font-weight: 500;
      line-height: 28px;
    }

    .metric-body {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
    }

    .metric-content {
      flex: 1 1 auto;
      min-width: 0;
    }

    .metric-main {
      display: flex;
      align-items: baseline;
      height: 32px;
      margin: 0 0 2px;
      white-space: nowrap;
    }

    .metric-value {
      font-family: "JDZhengHT-EN-Regular", "JDZhengHT-EN", sans-serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 32px;
      letter-spacing: 0;
    }

    .metric-unit {
      margin-left: 4px;
      font-size: 16px;
      font-weight: 400;
      line-height: 22px;
    }

    .submetrics {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 2px 12px;
      max-width: 100%;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 14px;
      line-height: 22px;
    }

    .submetric {
      display: inline-flex;
      align-items: baseline;
      min-width: 0;
      height: 22px;
      white-space: nowrap;
    }

    .submetric-label {
      color: var(--muted);
    }

    .submetric-value {
      margin-left: 4px;
      font-weight: 500;
    }

    .metric-aside {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex: 0 0 132px;
      width: 132px;
      min-height: 52px;
    }

    .is-positive {
      color: var(--positive);
    }

    .is-negative {
      color: var(--negative);
    }

    .is-neutral {
      color: var(--neutral);
    }

    .mini-chart {
      width: 132px;
      height: 52px;
    }

    .mini-chart svg {
      display: block;
      width: 132px;
      height: 52px;
      overflow: visible;
    }

    @media (max-width: 1120px) {
      .metric-grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>
<body>
  <main>
    <section class="metric-grid" aria-label="核心指标卡组">
      <article class="metric-card" data-mini-chart="gmv">
        <h2 class="metric-title">成交金额</h2>
        <div class="metric-body">
          <div class="metric-content">
            <div class="metric-main" aria-label="成交金额 ¥10,618 万">
              <span class="metric-value">¥10,618</span>
              <span class="metric-unit">万</span>
            </div>
            <ul class="submetrics" aria-label="成交金额子指标">
              <li class="submetric"><span class="submetric-label">同比</span><span class="submetric-value is-neutral">持平</span></li>
              <li class="submetric"><span class="submetric-label">环比</span><span class="submetric-value is-negative">-1.76%</span></li>
              <li class="submetric"><span class="submetric-label">行业均值</span><span class="submetric-value is-neutral">¥9,842万</span></li>
            </ul>
          </div>
          <div class="metric-aside">
            <div class="mini-chart" aria-hidden="true"></div>
          </div>
        </div>
      </article>

      <article class="metric-card" data-mini-chart="conversion">
        <h2 class="metric-title">转化率</h2>
        <div class="metric-body">
          <div class="metric-content">
            <div class="metric-main" aria-label="转化率 8.94%">
              <span class="metric-value">8.94</span>
              <span class="metric-unit">%</span>
            </div>
            <ul class="submetrics" aria-label="转化率子指标">
              <li class="submetric"><span class="submetric-label">同比</span><span class="submetric-value is-positive">+1.24pp</span></li>
              <li class="submetric"><span class="submetric-label">环比</span><span class="submetric-value is-positive">+0.38pp</span></li>
              <li class="submetric"><span class="submetric-label">行业均值</span><span class="submetric-value is-neutral">8.21%</span></li>
            </ul>
          </div>
          <div class="metric-aside">
            <div class="mini-chart" aria-hidden="true"></div>
          </div>
        </div>
      </article>

      <article class="metric-card" data-mini-chart="visitors">
        <h2 class="metric-title">访客数</h2>
        <div class="metric-body">
          <div class="metric-content">
            <div class="metric-main" aria-label="访客数 36.8 万">
              <span class="metric-value">36.8</span>
              <span class="metric-unit">万</span>
            </div>
            <ul class="submetrics" aria-label="访客数子指标">
              <li class="submetric"><span class="submetric-label">同比</span><span class="submetric-value is-positive">+8.36%</span></li>
              <li class="submetric"><span class="submetric-label">环比</span><span class="submetric-value is-negative">-2.18%</span></li>
              <li class="submetric"><span class="submetric-label">行业均值</span><span class="submetric-value is-neutral">31.5万</span></li>
            </ul>
          </div>
          <div class="metric-aside">
            <div class="mini-chart" aria-hidden="true"></div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <script>
    const miniChartData = {
      gmv: [52, 54, 58, 66, 72, 70, 65, 63, 71, 78, 86, 84],
      conversion: [6.9, 7.1, 7.4, 7.2, 7.8, 8.1, 7.9, 8.3, 8.2, 8.5, 8.7, 8.94],
      visitors: [28, 31, 30, 34, 36, 35, 38, 41, 39, 42, 45, 47],
    };

    function renderMiniBarChart(points, options = {}) {
      const width = options.width || 132;
      const height = options.height || 52;
      const padding = options.padding || 4;
      const fill = options.fill || '#2f6bff';
      const fillOpacity = options.fillOpacity || 0.72;
      const gap = options.gap || 2;
      const min = Math.min(...points);
      const max = Math.max(...points);
      const span = max - min || 1;
      const innerWidth = width - padding * 2;
      const innerHeight = height - padding * 2;
      const barWidth = Math.max(2, (innerWidth - gap * (points.length - 1)) / points.length);

      const bars = points.map((value, index) => {
        const normalized = (value - min) / span;
        const barHeight = Math.max(2, innerHeight * normalized);
        const x = padding + index * (barWidth + gap);
        const y = height - padding - barHeight;
        return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${barHeight.toFixed(1)}" rx="1" fill="${fill}" opacity="${fillOpacity}"></rect>`;
      }).join('');

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="迷你柱状图">
          ${bars}
        </svg>
      `;
    }

    document.querySelectorAll('[data-mini-chart]').forEach((card) => {
      const key = card.dataset.miniChart;
      const target = card.querySelector('.mini-chart');
      target.innerHTML = renderMiniBarChart(miniChartData[key]);
    });
  </script>
</body>
</html>
